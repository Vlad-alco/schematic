<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Принципиальная схема — Слаботочная часть BuhloWar v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e17; color: #e0e6f0; font-family: 'Segoe UI', 'Arial', sans-serif; display: flex; justify-content: center; padding: 20px; }
  .container { max-width: 100%; overflow: auto; }
  svg { display: block; margin: 0 auto; }
  .pin-label { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #e0e6f0; }
  .pin-num { font-family: 'Consolas', 'Courier New', monospace; font-size: 9px; fill: #8899aa; }
  .comp-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #e0e6f0; font-weight: 600; }
  .comp-sublabel { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #8899aa; }
  .bus-label { font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; font-weight: 700; }
  .signal-label { font-family: 'Consolas', 'Courier New', monospace; font-size: 9px; }
  .title-text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e6f0; }
  .small-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 8.5px; fill: #8899aa; }
  .value-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 9px; fill: #66ccff; }
  .addr-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 9px; fill: #ffcc66; }
  .warn-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #ff6666; font-weight: 600; }
  .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #aaccee; font-weight: 700; }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1800" width="2400" height="1800">
<defs>
  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2035" stroke-width="0.5"/>
  </pattern>
  <pattern id="gridMajor" width="100" height="100" patternUnits="userSpaceOnUse">
    <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#1e2a45" stroke-width="0.8"/>
  </pattern>

  <!-- Arrow markers -->
  <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#33cc66"/>
  </marker>
  <marker id="arrowPurple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#cc66ff"/>
  </marker>
  <marker id="arrowCyan" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#33cccc"/>
  </marker>
  <marker id="arrowOrange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff8833"/>
  </marker>
  <marker id="arrowYellow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccc33"/>
  </marker>
  <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#4488ff"/>
  </marker>
  <marker id="arrowLtBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#66bbff"/>
  </marker>

  <!-- Resistor symbol (horizontal) -->
  <symbol id="resistorH" viewBox="0 0 40 12">
    <path d="M 0 6 L 8 6 L 10 1 L 14 11 L 18 1 L 22 11 L 26 1 L 30 11 L 32 6 L 40 6" fill="none" stroke="inherit" stroke-width="1.5"/>
  </symbol>
  <!-- Resistor symbol (vertical) -->
  <symbol id="resistorV" viewBox="0 0 12 40">
    <path d="M 6 0 L 6 8 L 1 10 L 11 14 L 1 18 L 11 22 L 1 26 L 11 30 L 6 32 L 6 40" fill="none" stroke="inherit" stroke-width="1.5"/>
  </symbol>

  <!-- GND symbol -->
  <symbol id="gnd" viewBox="0 0 20 16">
    <line x1="10" y1="0" x2="10" y2="6" stroke="#555" stroke-width="1.5"/>
    <line x1="2" y1="6" x2="18" y2="6" stroke="#555" stroke-width="1.5"/>
    <line x1="5" y1="10" x2="15" y2="10" stroke="#555" stroke-width="1.2"/>
    <line x1="8" y1="14" x2="12" y2="14" stroke="#555" stroke-width="0.8"/>
  </symbol>

  <!-- Button symbol -->
  <symbol id="button" viewBox="0 0 30 24">
    <line x1="0" y1="12" x2="8" y2="12" stroke="inherit" stroke-width="1.5"/>
    <line x1="22" y1="12" x2="30" y2="12" stroke="inherit" stroke-width="1.5"/>
    <circle cx="10" cy="12" r="2" fill="none" stroke="inherit" stroke-width="1"/>
    <circle cx="20" cy="12" r="2" fill="none" stroke="inherit" stroke-width="1"/>
    <line x1="12" y1="12" x2="18" y2="6" stroke="inherit" stroke-width="1.5"/>
  </symbol>

  <!-- Buzzer symbol -->
  <symbol id="buzzer" viewBox="0 0 30 30">
    <circle cx="15" cy="15" r="10" fill="none" stroke="inherit" stroke-width="1.5"/>
    <text x="15" y="19" text-anchor="middle" font-size="10" fill="inherit">~</text>
  </symbol>

  <!-- Glow filter -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowStrong">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Component gradient backgrounds -->
  <linearGradient id="esp32Grad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1a2744"/><stop offset="100%" stop-color="#0f1a30"/>
  </linearGradient>
  <linearGradient id="modGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e2d44"/><stop offset="100%" stop-color="#141e30"/>
  </linearGradient>
  <linearGradient id="ssrGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2a1e1e"/><stop offset="100%" stop-color="#1e1414"/>
  </linearGradient>
  <linearGradient id="sensorGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e2a1e"/><stop offset="100%" stop-color="#141e14"/>
  </linearGradient>
  <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0f1a30"/><stop offset="50%" stop-color="#1a2744"/><stop offset="100%" stop-color="#0f1a30"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="2400" height="1800" fill="#0c1018"/>
<rect width="2400" height="1800" fill="url(#grid)"/>
<rect width="2400" height="1800" fill="url(#gridMajor)"/>

<!-- Border -->
<rect x="2" y="2" width="2396" height="1796" fill="none" stroke="#2a3a55" stroke-width="2" rx="4"/>

<!-- ===== TITLE BLOCK ===== -->
<g id="titleBlock">
  <rect x="20" y="12" width="2360" height="55" fill="url(#titleGrad)" stroke="#2a4a6a" stroke-width="1.5" rx="4"/>
  <text x="1200" y="38" text-anchor="middle" class="title-text" font-size="18" font-weight="700" fill="#66bbff">Принципиальная электрическая схема — Слаботочная часть BuhloWar v2.0</text>
  <text x="1200" y="56" text-anchor="middle" class="title-text" font-size="11" fill="#6699aa">ESP32-S3-DevKitC-1 — Периферийные подключения: датчики, дисплей, кнопки, SD-карта, реле, зуммер</text>
  <text x="2350" y="35" text-anchor="end" class="small-text">Лист 3</text>
  <text x="2350" y="48" text-anchor="end" class="small-text">Формат А2</text>
  <text x="50" y="35" class="small-text">BuhloWar v2.0</text>
  <text x="50" y="48" class="small-text">Слаботочная часть</text>
</g>

<!-- ===== POWER RAILS (vertical, left side) ===== -->
<g id="powerRails">
  <!-- 3.3V rail -->
  <line x1="42" y1="90" x2="42" y2="1720" stroke="#66bbff" stroke-width="2.5" stroke-dasharray="none" filter="url(#glow)"/>
  <text x="42" y="86" text-anchor="middle" class="bus-label" fill="#66bbff">+3.3В</text>
  <circle cx="42" cy="86" r="3" fill="#66bbff" opacity="0.6"/>

  <!-- 5V rail -->
  <line x1="68" y1="90" x2="68" y2="1720" stroke="#4488ff" stroke-width="2.5" filter="url(#glow)"/>
  <text x="68" y="86" text-anchor="middle" class="bus-label" fill="#4488ff">+5В</text>
  <circle cx="68" cy="86" r="3" fill="#4488ff" opacity="0.6"/>

  <!-- GND rail -->
  <line x1="94" y1="90" x2="94" y2="1720" stroke="#555555" stroke-width="3"/>
  <text x="94" y="86" text-anchor="middle" class="bus-label" fill="#888888">GND</text>
</g>

<!-- ===== ESP32-S3-DevKitC-1 (CENTER) ===== -->
<g id="esp32">
  <!-- IC body -->
  <rect x="920" y="430" width="310" height="810" fill="url(#esp32Grad)" stroke="#3388bb" stroke-width="2" rx="6" filter="url(#glow)"/>
  <!-- Notch -->
  <path d="M 1055 430 A 20 20 0 0 0 1095 430" fill="#0c1018" stroke="#3388bb" stroke-width="1.5"/>

  <!-- ESP32 label -->
  <text x="1075" y="470" text-anchor="middle" class="title-text" font-size="14" font-weight="700" fill="#66ccff">ESP32-S3</text>
  <text x="1075" y="488" text-anchor="middle" class="comp-sublabel" font-size="10">DevKitC-1</text>
  <text x="1075" y="504" text-anchor="middle" class="small-text">N16R8 / 16MB Flash</text>
  <!-- Chip icon -->
  <rect x="1040" y="510" width="70" height="50" fill="none" stroke="#3388bb" stroke-width="1" rx="3"/>
  <text x="1075" y="535" text-anchor="middle" font-size="8" fill="#5599aa">ESP32-S3</text>
  <text x="1075" y="548" text-anchor="middle" font-size="7" fill="#447788">WROOM-1</text>

  <!-- Pin pad dots and labels — LEFT SIDE (inputs) -->
  <!-- y positions: starting at 540, spacing 42px, 13 pins -->

  <!-- Pin 1: 3V3 -->
  <rect x="912" y="536" width="16" height="8" fill="#66bbff" rx="1"/>
  <text x="938" y="544" text-anchor="start" class="pin-label" fill="#66bbff" font-weight="700">3V3</text>

  <!-- Pin 2: GPIO3 1-Wire -->
  <rect x="912" y="578" width="16" height="8" fill="#33cccc" rx="1"/>
  <text x="938" y="586" text-anchor="start" class="pin-label" fill="#33cccc">GPIO3</text>
  <text x="938" y="597" text-anchor="start" class="small-text">1-Wire шина</text>

  <!-- Pin 3: GPIO4 BTN DOWN -->
  <rect x="912" y="620" width="16" height="8" fill="#cccc33" rx="1"/>
  <text x="938" y="628" text-anchor="start" class="pin-label" fill="#cccc33">GPIO4</text>
  <text x="938" y="639" text-anchor="start" class="small-text">BTN DOWN</text>

  <!-- Pin 4: GPIO5 BTN UP -->
  <rect x="912" y="662" width="16" height="8" fill="#cccc33" rx="1"/>
  <text x="938" y="670" text-anchor="start" class="pin-label" fill="#cccc33">GPIO5</text>
  <text x="938" y="681" text-anchor="start" class="small-text">BTN UP</text>

  <!-- Pin 5: GPIO6 BTN SET -->
  <rect x="912" y="704" width="16" height="8" fill="#cccc33" rx="1"/>
  <text x="938" y="712" text-anchor="start" class="pin-label" fill="#cccc33">GPIO6</text>
  <text x="938" y="723" text-anchor="start" class="small-text">BTN SET</text>

  <!-- Pin 6: GPIO7 BTN BACK -->
  <rect x="912" y="746" width="16" height="8" fill="#cccc33" rx="1"/>
  <text x="938" y="754" text-anchor="start" class="pin-label" fill="#cccc33">GPIO7</text>
  <text x="938" y="765" text-anchor="start" class="small-text">BTN BACK</text>

  <!-- Pin 7: GPIO8 I2C SDA -->
  <rect x="912" y="788" width="16" height="8" fill="#33cc66" rx="1"/>
  <text x="938" y="796" text-anchor="start" class="pin-label" fill="#33cc66">GPIO8</text>
  <text x="938" y="807" text-anchor="start" class="small-text">I²C SDA</text>

  <!-- Pin 8: GPIO9 I2C SCL -->
  <rect x="912" y="830" width="16" height="8" fill="#33cc66" rx="1"/>
  <text x="938" y="838" text-anchor="start" class="pin-label" fill="#33cc66">GPIO9</text>
  <text x="938" y="849" text-anchor="start" class="small-text">I²C SCL</text>

  <!-- Pin 9: GND -->
  <rect x="912" y="872" width="16" height="8" fill="#666666" rx="1"/>
  <text x="938" y="880" text-anchor="start" class="pin-label" fill="#888888">GND</text>

  <!-- Pin 10: GPIO12 SPI MISO -->
  <rect x="912" y="914" width="16" height="8" fill="#cc66ff" rx="1"/>
  <text x="938" y="922" text-anchor="start" class="pin-label" fill="#cc66ff">GPIO12</text>
  <text x="938" y="933" text-anchor="start" class="small-text">SPI MISO</text>

  <!-- Pin 11: GPIO13 SPI MOSI -->
  <rect x="912" y="956" width="16" height="8" fill="#cc66ff" rx="1"/>
  <text x="938" y="964" text-anchor="start" class="pin-label" fill="#cc66ff">GPIO13</text>
  <text x="938" y="975" text-anchor="start" class="small-text">SPI MOSI</text>

  <!-- Pin 12: GPIO14 SPI SCK -->
  <rect x="912" y="998" width="16" height="8" fill="#cc66ff" rx="1"/>
  <text x="938" y="1006" text-anchor="start" class="pin-label" fill="#cc66ff">GPIO14</text>
  <text x="938" y="1017" text-anchor="start" class="small-text">SPI SCK</text>

  <!-- Pin 13: GPIO15 SPI CS -->
  <rect x="912" y="1040" width="16" height="8" fill="#cc66ff" rx="1"/>
  <text x="938" y="1048" text-anchor="start" class="pin-label" fill="#cc66ff">GPIO15</text>
  <text x="938" y="1059" text-anchor="start" class="small-text">SPI CS</text>

  <!-- Pin 14: 5V -->
  <rect x="912" y="1082" width="16" height="8" fill="#4488ff" rx="1"/>
  <text x="938" y="1090" text-anchor="start" class="pin-label" fill="#4488ff" font-weight="700">5V</text>

  <!-- Pin 15: GND2 -->
  <rect x="912" y="1124" width="16" height="8" fill="#666666" rx="1"/>
  <text x="938" y="1132" text-anchor="start" class="pin-label" fill="#888888">GND</text>

  <!-- Pin pad dots and labels — RIGHT SIDE (outputs) -->
  <!-- y positions: starting at 540, spacing 42px, 12 pins -->

  <!-- Pin R1: GPIO2 VALVE_WATER -->
  <rect x="1222" y="536" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="544" text-anchor="end" class="pin-label" fill="#ff8833">GPIO2</text>
  <text x="1216" y="555" text-anchor="end" class="small-text">Клапан воды</text>

  <!-- Pin R2: GPIO16 SPARE1 -->
  <rect x="1222" y="578" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="586" text-anchor="end" class="pin-label" fill="#ff8833">GPIO16</text>
  <text x="1216" y="597" text-anchor="end" class="small-text">Запас ENMG3</text>

  <!-- Pin R3: GPIO17 SPARE2 -->
  <rect x="1222" y="620" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="628" text-anchor="end" class="pin-label" fill="#ff8833">GPIO17</text>
  <text x="1216" y="639" text-anchor="end" class="small-text">Запас ENMG4</text>

  <!-- Pin R4: GPIO18 HEATER2 -->
  <rect x="1222" y="662" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="670" text-anchor="end" class="pin-label" fill="#ff8833">GPIO18</text>
  <text x="1216" y="681" text-anchor="end" class="small-text">ТЭН реж.2</text>

  <!-- Pin R5: GPIO21 BUZZER -->
  <rect x="1222" y="704" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="712" text-anchor="end" class="pin-label" fill="#ff8833">GPIO21</text>
  <text x="1216" y="723" text-anchor="end" class="small-text">Зуммер</text>

  <!-- Pin R6: GPIO37 VALVE_HEAD -->
  <rect x="1222" y="746" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="754" text-anchor="end" class="pin-label" fill="#ff8833">GPIO37</text>
  <text x="1216" y="765" text-anchor="end" class="small-text">Клапан голов</text>

  <!-- Pin R7: GPIO38 VALVE_BODY -->
  <rect x="1222" y="788" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="796" text-anchor="end" class="pin-label" fill="#ff8833">GPIO38</text>
  <text x="1216" y="807" text-anchor="end" class="small-text">Клапан тела</text>

  <!-- Pin R8: GPIO42 CONTACTOR -->
  <rect x="1222" y="830" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="838" text-anchor="end" class="pin-label" fill="#ff8833">GPIO42</text>
  <text x="1216" y="849" text-anchor="end" class="small-text">Контактор</text>

  <!-- Pin R9: GPIO46 HEATER1 -->
  <rect x="1222" y="872" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="880" text-anchor="end" class="pin-label" fill="#ff8833">GPIO46</text>
  <text x="1216" y="891" text-anchor="end" class="small-text">ТЭН реж.1</text>

  <!-- Pin R10: GPIO47 MIXER -->
  <rect x="1222" y="914" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="922" text-anchor="end" class="pin-label" fill="#ff8833">GPIO47</text>
  <text x="1216" y="933" text-anchor="end" class="small-text">Мешалка</text>

  <!-- Pin R11: GPIO48 SPARE3 -->
  <rect x="1222" y="956" width="16" height="8" fill="#ff8833" rx="1"/>
  <text x="1216" y="964" text-anchor="end" class="pin-label" fill="#ff8833">GPIO48</text>
  <text x="1216" y="975" text-anchor="end" class="small-text">Запас TZT4</text>

  <!-- Internal block diagram inside ESP32 -->
  <rect x="960" y="565" width="230" height="30" fill="none" stroke="#2a4a6a" stroke-width="0.8" stroke-dasharray="3,2" rx="3"/>
  <text x="1075" y="584" text-anchor="middle" class="small-text" fill="#4477aa">Входы / Сенсоры</text>

  <rect x="960" y="770" width="230" height="30" fill="none" stroke="#2a6a4a" stroke-width="0.8" stroke-dasharray="3,2" rx="3"/>
  <text x="1075" y="789" text-anchor="middle" class="small-text" fill="#44aa77">I²C Шина</text>

  <rect x="960" y="895" width="230" height="30" fill="none" stroke="#6a2a6a" stroke-width="0.8" stroke-dasharray="3,2" rx="3"/>
  <text x="1075" y="914" text-anchor="middle" class="small-text" fill="#aa44aa">SPI Шина</text>

  <!-- Right side groups -->
  <rect x="960" y="525" width="230" height="42" fill="none" stroke="#6a4a2a" stroke-width="0.8" stroke-dasharray="3,2" rx="3"/>
  <text x="1075" y="550" text-anchor="middle" class="small-text" fill="#aa7744">Управление реле</text>
</g>

<!-- ===== 1-WIRE BUS SECTION (Left, upper) ===== -->
<g id="oneWireSection">
  <!-- Section label -->
  <rect x="120" y="85" width="320" height="24" fill="#1a2a2a" stroke="#33cccc" stroke-width="1" rx="4"/>
  <text x="280" y="102" text-anchor="middle" class="section-title" fill="#33cccc">1-Wire шина — DS18B20 ×4</text>

  <!-- 1-Wire bus line (horizontal) -->
  <line x1="94" y1="150" x2="912" y2="582" stroke="#33cccc" stroke-width="2" stroke-dasharray="8,3" filter="url(#glow)"/>

  <!-- Pull-up resistor R1 4.7k on 1-Wire -->
  <line x1="350" y1="150" x2="350" y2="120" stroke="#66bbff" stroke-width="1.2"/>
  <use href="#resistorV" x="344" y="80" width="12" height="40" style="stroke:#66bbff"/>
  <line x1="350" y1="80" x2="350" y2="76" stroke="#66bbff" stroke-width="1.2"/>
  <line x1="350" y1="76" x2="42" y2="76" stroke="#66bbff" stroke-width="1.2"/>
  <circle cx="42" cy="76" r="3" fill="#66bbff"/>
  <text x="356" y="108" class="value-text">R1 4.7кОм</text>
  <text x="356" y="120" class="small-text">pull-up</text>

  <!-- Junction dot on 1-Wire bus at x=350 -->
  <circle cx="350" cy="150" r="3" fill="#33cccc"/>

  <!-- DS18B20 #1 -->
  <rect x="140" y="128" width="100" height="44" fill="url(#sensorGrad)" stroke="#33cccc" stroke-width="1.2" rx="4"/>
  <text x="190" y="146" text-anchor="middle" class="comp-label" font-size="10" fill="#33cccc">DS18B20 #1</text>
  <text x="190" y="160" text-anchor="middle" class="small-text">Куб</text>
  <line x1="240" y1="150" x2="350" y2="150" stroke="#33cccc" stroke-width="1.5"/>
  <circle cx="240" cy="150" r="2" fill="#33cccc"/>
  <!-- DS18B20 power -->
  <line x1="165" y1="128" x2="165" y2="115" stroke="#66bbff" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="165" y1="115" x2="42" y2="115" stroke="#66bbff" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="42" cy="115" r="2" fill="#66bbff"/>
  <text x="168" y="125" class="small-text" fill="#66bbff">VDD</text>
