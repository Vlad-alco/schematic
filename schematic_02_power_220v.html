<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Принципиальная электрическая схема — Силовая часть BuhloWar v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }
  .schematic-wrapper {
    background: #ffffff;
    border: 2px solid #333;
    max-width: 2000px;
    width: 100%;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  svg { display: block; width: 100%; height: auto; }
  .wire-ac { stroke: #cc0000; stroke-width: 2; fill: none; }
  .wire-ac-thick { stroke: #cc0000; stroke-width: 3.5; fill: none; }
  .wire-neutral { stroke: #0044aa; stroke-width: 2; fill: none; }
  .wire-neutral-thick { stroke: #0044aa; stroke-width: 3.5; fill: none; }
  .wire-12v { stroke: #dd6600; stroke-width: 2; fill: none; }
  .wire-12v-thick { stroke: #dd6600; stroke-width: 3; fill: none; }
  .wire-5v { stroke: #0066cc; stroke-width: 2; fill: none; }
  .wire-33v { stroke: #0099dd; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; }
  .wire-gnd { stroke: #333333; stroke-width: 2; fill: none; }
  .wire-gnd-thick { stroke: #333333; stroke-width: 3; fill: none; }
  .wire-ctrl { stroke: #7722cc; stroke-width: 1.5; fill: none; stroke-dasharray: 8,4; }
  .comp-body { stroke: #333; stroke-width: 1.5; fill: #f8f8f8; }
  .comp-body-dark { stroke: #333; stroke-width: 1.5; fill: #e8e8e8; }
  .comp-body-ssr { stroke: #555; stroke-width: 1.5; fill: #f0f4ff; }
  .comp-body-psu { stroke: #333; stroke-width: 1.5; fill: #f5fff5; }
  .comp-body-load { stroke: #333; stroke-width: 1.5; fill: #fff5f5; }
  .label { font-family: 'Segoe UI', Arial, sans-serif; fill: #222; }
  .label-ref { font-family: 'Courier New', monospace; fill: #111; font-weight: bold; }
  .label-wire { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; }
  .label-gpio { font-family: 'Courier New', monospace; fill: #7722cc; font-size: 9px; font-weight: bold; }
  .terminal { fill: #333; stroke: #111; stroke-width: 1; }
  .junction { fill: #333; stroke: none; }
</style>
</head>
<body>
<div class="schematic-wrapper">
<svg viewBox="0 0 1980 2200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.3"/>
  </pattern>
  <!-- Arrow marker for control signals -->
  <marker id="arrowCtrl" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0,0 8,3 0,6" fill="#7722cc"/>
  </marker>
  <!-- Arrow marker for AC -->
  <marker id="arrowAC" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
    <polygon points="0,0 6,3 0,6" fill="#cc0000"/>
  </marker>
  <!-- Ground symbol -->
  <symbol id="gndSym" viewBox="0 0 24 20">
    <line x1="12" y1="0" x2="12" y2="6" stroke="#333" stroke-width="2"/>
    <line x1="2" y1="6" x2="22" y2="6" stroke="#333" stroke-width="2"/>
    <line x1="5" y1="10" x2="19" y2="10" stroke="#333" stroke-width="1.5"/>
    <line x1="8" y1="14" x2="16" y2="14" stroke="#333" stroke-width="1.5"/>
    <line x1="11" y1="18" x2="13" y2="18" stroke="#333" stroke-width="1"/>
  </symbol>
  <!-- Fuse symbol -->
  <symbol id="fuseSym" viewBox="0 0 20 40">
    <rect x="5" y="0" width="10" height="40" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="10" y1="6" x2="10" y2="34" stroke="#333" stroke-width="1.5"/>
  </symbol>
  <!-- NO Contact symbol -->
  <symbol id="contactNO" viewBox="0 0 30 24">
    <circle cx="5" cy="12" r="3" fill="#333" stroke="none"/>
    <circle cx="25" cy="12" r="3" fill="#333" stroke="none"/>
    <line x1="8" y1="12" x2="22" y2="4" stroke="#333" stroke-width="2"/>
  </symbol>
  <!-- Coil symbol (contactor/relay) -->
  <symbol id="coilSym" viewBox="0 0 40 30">
    <rect x="0" y="0" width="40" height="30" rx="8" fill="none" stroke="#333" stroke-width="1.5"/>
  </symbol>
  <!-- Resistor symbol -->
  <symbol id="resistorSym" viewBox="0 0 60 16">
    <polyline points="0,8 8,8 12,2 20,14 28,2 36,14 44,2 52,14 56,8 60,8" fill="none" stroke="#333" stroke-width="1.5"/>
  </symbol>
  <!-- Capacitor symbol -->
  <symbol id="capSym" viewBox="0 0 20 24">
    <line x1="10" y1="0" x2="10" y2="9" stroke="#333" stroke-width="1.5"/>
    <line x1="2" y1="9" x2="18" y2="9" stroke="#333" stroke-width="2"/>
    <line x1="2" y1="13" x2="18" y2="13" stroke="#333" stroke-width="2"/>
    <line x1="10" y1="13" x2="10" y2="24" stroke="#333" stroke-width="1.5"/>
  </symbol>
</defs>

<!-- Background -->
<rect width="1980" height="2200" fill="#fefefe"/>
<rect width="1980" height="2200" fill="url(#grid)"/>

<!-- ═══════════════════════════════════════════ -->
<!-- TITLE BLOCK                                 -->
<!-- ═══════════════════════════════════════════ -->
<rect x="0" y="0" width="1980" height="68" fill="#1a1a3e" stroke="none"/>
<text x="990" y="30" text-anchor="middle" class="label" style="font-size:20px;font-weight:bold;fill:#fff;">Принципиальная электрическая схема — Силовая часть BuhloWar v2.0</text>
<text x="990" y="52" text-anchor="middle" class="label" style="font-size:12px;fill:#aab;">220В AC / 12В DC / 5В DC — Схема соединений</text>
<rect x="1760" y="4" width="210" height="60" rx="4" fill="none" stroke="#556" stroke-width="1"/>
<text x="1865" y="22" text-anchor="middle" class="label" style="font-size:10px;fill:#aab;">Лист 2 из 2</text>
<text x="1865" y="38" text-anchor="middle" class="label" style="font-size:10px;fill:#aab;">Масштаб: н/с</text>
<text x="1865" y="54" text-anchor="middle" class="label" style="font-size:10px;fill:#aab;">Формат: A2</text>

<!-- ═══════════════════════════════════════════ -->
<!-- INPUT SECTION: L and N 220V AC              -->
<!-- ═══════════════════════════════════════════ -->

<!-- L input terminal -->
<circle cx="500" cy="105" r="8" class="terminal"/>
<text x="500" y="90" text-anchor="middle" class="label" style="font-size:14px;font-weight:bold;fill:#cc0000;">L</text>
<text x="500" y="78" text-anchor="middle" class="label" style="font-size:9px;fill:#999;">220В AC</text>
<text x="500" y="125" text-anchor="middle" class="label" style="font-size:8px;fill:#666;">Фаза</text>

<!-- N input terminal -->
<circle cx="700" cy="105" r="8" class="terminal"/>
<text x="700" y="90" text-anchor="middle" class="label" style="font-size:14px;font-weight:bold;fill:#0044aa;">N</text>
<text x="700" y="78" text-anchor="middle" class="label" style="font-size:9px;fill:#999;">220В AC</text>
<text x="700" y="125" text-anchor="middle" class="label" style="font-size:8px;fill:#666;">Ноль</text>

<!-- PE terminal -->
<circle cx="880" cy="105" r="8" fill="#22aa22" stroke="#111" stroke-width="1"/>
<text x="880" y="90" text-anchor="middle" class="label" style="font-size:14px;font-weight:bold;fill:#22aa22;">PE</text>
<text x="880" y="125" text-anchor="middle" class="label" style="font-size:8px;fill:#666;">Земля</text>

<!-- Wires from terminals to RCBO -->
<line x1="500" y1="113" x2="500" y2="148" class="wire-ac-thick"/>
<line x1="700" y1="113" x2="700" y2="148" class="wire-neutral-thick"/>
<line x1="880" y1="113" x2="880" y2="148" stroke="#22aa22" stroke-width="2.5" fill="none"/>

<!-- ═══════════════════════════════════════════ -->
<!-- RCBO — ДИФАВТОМАТ 2P 20A тип C 30мА        -->
<!-- ═══════════════════════════════════════════ -->

<!-- RCBO body -->
<rect x="455" y="148" width="100" height="65" class="comp-body" rx="3"/>
<rect x="655" y="148" width="100" height="65" class="comp-body" rx="3"/>
<!-- Link between poles (residual current device) -->
<rect x="555" y="168" width="100" height="26" rx="5" fill="#ffe8e8" stroke="#cc0000" stroke-width="1" stroke-dasharray="4,2"/>
<text x="605" y="185" text-anchor="middle" class="label" style="font-size:8px;fill:#cc0000;">УЗО 30мА</text>

<!-- L pole internals -->
<line x1="475" y1="148" x2="475" y2="168" class="wire-ac"/>
<!-- Breaker contact symbol -->
<line x1="475" y1="168" x2="475" y2="178" stroke="#333" stroke-width="2"/>
<line x1="475" y1="178" x2="490" y2="190" stroke="#333" stroke-width="2"/>
<line x1="490" y1="190" x2="475" y2="195" stroke="#333" stroke-width="2"/>
<line x1="475" y1="195" x2="475" y2="213" class="wire-ac"/>
<!-- Toggle symbol -->
<rect x="497" y="165" width="16" height="26" rx="2" fill="#ffe0e0" stroke="#cc0000" stroke-width="1"/>
<text x="505" y="182" text-anchor="middle" class="label" style="font-size:8px;fill:#cc0000;">ON</text>

<!-- N pole internals -->
<line x1="675" y1="148" x2="675" y2="168" class="wire-neutral"/>
<line x1="675" y1="168" x2="675" y2="178" stroke="#333" stroke-width="2"/>
<line x1="675" y1="178" x2="690" y2="190" stroke="#333" stroke-width="2"/>
<line x1="690" y1="190" x2="675" y2="195" stroke="#333" stroke-width="2"/>
<line x1="675" y1="195" x2="675" y2="213" class="wire-neutral"/>

<!-- RCBO label -->
<text x="505" y="143" text-anchor="middle" class="label-ref" style="font-size:12px;">QF1</text>
<text x="505" y="230" text-anchor="middle" class="label" style="font-size:9px;">Дифавтомат 2P</text>
<text x="505" y="242" text-anchor="middle" class="label" style="font-size:8px;fill:#555;">20А тип C / 30мА</text>

<!-- Wires from RCBO to bus bars -->
<line x1="475" y1="213" x2="475" y2="280" class="wire-ac-thick"/>
<line x1="675" y1="213" x2="675" y2="290" class="wire-neutral-thick"/>
<line x1="880" y1="148" x2="880" y2="290" stroke="#22aa22" stroke-width="2.5" fill="none"/>

<!-- ═══════════════════════════════════════════ -->
<!-- BUS BARS: L' and N'                         -->
<!-- ═══════════════════════════════════════════ -->

<!-- L' bus bar (horizontal thick line) -->
<line x1="80" y1="280" x2="1500" y2="280" class="wire-ac-thick"/>
<text x="90" y="275" text-anchor="start" class="label" style="font-size:14px;font-weight:bold;fill:#cc0000;">L'</text>
<text x="90" y="298" text-anchor="start" class="label" style="font-size:8px;fill:#999;">220В AC (после QF1)</text>

<!-- N' bus bar -->
<line x1="80" y1="290" x2="1500" y2="290" class="wire-neutral-thick"/>
<text x="150" y="275" text-anchor="start" class="label" style="font-size:14px;font-weight:bold;fill:#0044aa;">N'</text>

<!-- PE bus bar -->
<line x1="80" y1="300" x2="1500" y2="300" stroke="#22aa22" stroke-width="2.5" fill="none"/>
<text x="210" y="275" text-anchor="start" class="label" style="font-size:14px;font-weight:bold;fill:#22aa22;">PE</text>

<!-- Connection dots on bus bars -->
<circle cx="475" cy="280" r="4" class="junction"/>
<circle cx="675" cy="290" r="4" class="junction"/>
<circle cx="880" cy="300" r="4" fill="#22aa22"/>

<!-- Branch tap points on L' bus -->
<circle cx="150" cy="280" r="4" class="junction"/>  <!-- Branch 1 -->
<circle cx="340" cy="280" r="4" class="junction"/>  <!-- Branch 2 -->
<circle cx="540" cy="280" r="4" class="junction"/>  <!-- Branch 3a: contact path -->
<circle cx="690" cy="280" r="4" class="junction"/>  <!-- Branch 3b: coil path -->
<circle cx="830" cy="280" r="4" class="junction"/>  <!-- Branch 4 -->
<circle cx="1040" cy="280" r="4" class="junction"/>  <!-- Branch 5 -->
<circle cx="1260" cy="280" r="4" class="junction"/>  <!-- Branch 6 -->

<!-- Branch tap points on N' bus -->
<circle cx="150" cy="290" r="4" class="junction"/>
<circle cx="340" cy="290" r="4" class="junction"/>
<circle cx="580" cy="290" r="4" class="junction"/>
<circle cx="830" cy="290" r="4" class="junction"/>
<circle cx="1040" cy="290" r="4" class="junction"/>
<circle cx="1260" cy="290" r="4" class="junction"/>

<!-- ═══════════════════════════════════════════ -->
<!-- ВОЛЬТМЕТР TOMZN (across L'-N')              -->
<!-- ═══════════════════════════════════════════ -->

<circle cx="1440" cy="285" r="18" fill="#fffff0" stroke="#333" stroke-width="1.5"/>
<text x="1440" y="289" text-anchor="middle" class="label" style="font-size:12px;font-weight:bold;">V</text>
<line x1="1440" y1="267" x2="1440" y2="280" class="wire-ac"/>
<line x1="1440" y1="303" x2="1440" y2="290" class="wire-neutral"/>
<circle cx="1440" cy="280" r="3" class="junction"/>
<circle cx="1440" cy="290" r="3" class="junction"/>
<text x="1470" y="280" class="label" style="font-size:9px;">PV1</text>
<text x="1470" y="292" class="label" style="font-size:8px;fill:#555;">TOMZN</text>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- BRANCH 1: БП RS-15-5 (5V/3A)                                 -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<!-- Vertical wire from L' bus down to fuse -->
<line x1="150" y1="280" x2="150" y2="330" class="wire-ac"/>

<!-- Fuse FU1 -->
<rect x="138" y="330" width="24" height="44" rx="3" fill="#fff8e8" stroke="#333" stroke-width="1.5"/>
<line x1="150" y1="338" x2="150" y2="366" stroke="#333" stroke-width="2"/>
<circle cx="150" cy="345" r="5" fill="none" stroke="#333" stroke-width="1"/>
<line x1="150" y1="350" x2="150" y2="366" stroke="#333" stroke-width="1.5"/>
<text x="120" y="357" text-anchor="end" class="label-ref" style="font-size:10px;">FU1</text>
<text x="120" y="368" text-anchor="end" class="label" style="font-size:7px;fill:#555;">2А</text>

<!-- Wire from fuse to PSU -->
<line x1="150" y1="374" x2="150" y2="405" class="wire-ac"/>

<!-- PSU RS-15-5 -->
<rect x="110" y="405" width="80" height="110" rx="5" class="comp-body-psu"/>
<text x="150" y="425" text-anchor="middle" class="label-ref" style="font-size:10px;">G1</text>
<text x="150" y="440" text-anchor="middle" class="label" style="font-size:8px;">БП RS-15-5</text>
<text x="150" y="452" text-anchor="middle" class="label" style="font-size:7px;fill:#555;">5В / 3А</text>
<!-- Input terminals on PSU -->
<circle cx="125" cy="405" r="3" fill="#cc0000"/>
<text x="125" y="398" text-anchor="middle" class="label" style="font-size:7px;fill:#cc0000;">L</text>
<circle cx="175" cy="405" r="3" fill="#0044aa"/>
<text x="175" y="398" text-anchor="middle" class="label" style="font-size:7px;fill:#0044aa;">N</text>
<!-- Output terminals on PSU -->
<circle cx="125" cy="515" r="3" fill="#333"/>
<text x="125" y="530" text-anchor="middle" class="label" style="font-size:7px;fill:#333;">GND</text>
<circle cx="175" cy="515" r="3" fill="#0066cc"/>
<text x="175" y="530" text-anchor="middle" class="label" style="font-size:7px;fill:#0066cc;">+5В</text>

<!-- N wire to PSU -->
<line x1="175" y1="290" x2="175" y2="330" class="wire-neutral"/>
<line x1="175" y1="330" x2="200" y2="330" class="wire-neutral"/>
<line x1="200" y1="330" x2="200" y2="370" class="wire-neutral"/>
<line x1="200" y1="370" x2="175" y2="370" class="wire-neutral"/>
<line x1="175" y1="370" x2="175" y2="405" class="wire-neutral"/>

<!-- 5V DC output wires -->
<line x1="125" y1="515" x2="125" y2="560" class="wire-gnd"/>
<line x1="175" y1="515" x2="175" y2="560" class="wire-5v"/>
<!-- +5V bus label -->
<text x="190" y="560" class="label" style="font-size:9px;font-weight:bold;fill:#0066cc;">+5В</text>
<text x="190" y="572" class="label" style="font-size:8px;fill:#555;">3А max</text>
<!-- GND label -->
<text x="110" y="560" text-anchor="end" class="label" style="font-size:9px;font-weight:bold;fill:#333;">GND</text>
<!-- Ground symbols -->
<use href="#gndSym" x="113" y="565" width="24" height="20"/>

<!-- 5V goes to ESP32 + TZT SSR module (labeled) -->
<line x1="175" y1="560" x2="175" y2="600" class="wire-5v"/>
<line x1="175" y1="600" x2="60" y2="600" class="wire-5v"/>
<text x="115" y="596" text-anchor="middle" class="label" style="font-size:7px;fill:#0066cc;">→ ESP32, TZT SSR</text>

<line x1="125" y1="560" x2="125" y2="600" class="wire-gnd"/>
<line x1="125" y1="600" x2="60" y2="600" class="wire-gnd"/>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- BRANCH 2: БП RS-15-12 (12V/1.3A)                            -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<!-- Vertical wire from L' bus down to fuse -->
<line x1="340" y1="280" x2="340" y2="330" class="wire-ac"/>

<!-- Fuse FU2 -->
<rect x="328" y="330" width="24" height="44" rx="3" fill="#fff8e8" stroke="#333" stroke-width="1.5"/>
<line x1="340" y1="338" x2="340" y2="366" stroke="#333" stroke-width="2"/>
<circle cx="340" cy="345" r="5" fill="none" stroke="#333" stroke-width="1"/>
<line x1="340" y1="350" x2="340" y2="366" stroke="#333" stroke-width="1.5"/>
<text x="310" y="357" text-anchor="end" class="label-ref" style="font-size:10px;">FU2</text>
<text x="310" y="368" text-anchor="end" class="label" style="font-size:7px;fill:#555;">1.5А</text>

<!-- Wire from fuse to PSU -->
<line x1="340" y1="374" x2="340" y2="405" class="wire-ac"/>

<!-- PSU RS-15-12 -->
<rect x="300" y="405" width="80" height="110" rx="5" class="comp-body-psu"/>
<text x="340" y="425" text-anchor="middle" class="label-ref" style="font-size:10px;">G2</text>
<text x="340" y="440" text-anchor="middle" class="label" style="font-size:8px;">БП RS-15-12</text>
<text x="340" y="452" text-anchor="middle" class="label" style="font-size:7px;fill:#555;">12В / 1.3А</text>
<!-- Input terminals -->
<circle cx="315" cy="405" r="3" fill="#cc0000"/>
<text x="315" y="398" text-anchor="middle" class="label" style="font-size:7px;fill:#cc0000;">L</text>
<circle cx="365" cy="405" r="3" fill="#0044aa"/>
<text x="365" y="398" text-anchor="middle" class="label" style="font-size:7px;fill:#0044aa;">N</text>
<!-- Output terminals -->
<circle cx="315" cy="515" r="3" fill="#333"/>
<text x="315" y="530" text-anchor="middle" class="label" style="font-size:7px;fill:#333;">GND</text>
<circle cx="365" cy="515" r="3" fill="#dd6600"/>
<text x="365" y="530" text-anchor="middle" class="label" style="font-size:7px;fill:#dd6600;">+12В</text>

<!-- N wire to PSU -->
<line x1="365" y1="290" x2="365" y2="330" class="wire-neutral"/>
<line x1="365" y1="330" x2="390" y2="330" class="wire-neutral"/>
<line x1="390" y1="330" x2="390" y2="370" class="wire-neutral"/>
<line x1="390" y1="370" x2="365" y2="370" class="wire-neutral"/>
<line x1="365" y1="370" x2="365" y2="405" class="wire-neutral"/>

<!-- 12V DC output wires -->
<line x1="315" y1="515" x2="315" y2="560" class="wire-gnd"/>
<line x1="365" y1="515" x2="365" y2="560" class="wire-12v"/>

<!-- +12V and GND bus bars (vertical, going right) -->
<line x1="365" y1="560" x2="365" y2="590" class="wire-12v"/>
<line x1="365" y1="590" x2="1580" y2="590" class="wire-12v-thick"/>
<text x="1585" y="595" class="label" style="font-size:11px;font-weight:bold;fill:#dd6600;">+12В</text>

<line x1="315" y1="560" x2="315" y2="600" class="wire-gnd"/>
<line x1="315" y1="600" x2="1580" y2="600" class="wire-gnd-thick"/>
<text x="1585" y="605" class="label" style="font-size:11px;font-weight:bold;fill:#333;">GND</text>

<use href="#gndSym" x="315" y="608" width="24" height="20"/>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- BRANCH 3: Контактор PLTEK + РМ-2м + ТЭН                     -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<!-- Two independent sub-circuits from L' to N':                       -->
<!--   A) L' → K1 NO contact (13-14) → РМ-2м → ТЭН → N'  (силовая)  -->
<!--   B) L' → K1 катушка (A1-A2) → TZT SSR Ch.3 → N'   (управление)-->

<!-- Section label for Branch 3 -->
<rect x="470" y="270" width="280" height="14" rx="2" fill="#ffe0e0" stroke="#cc0000" stroke-width="0.5"/>
<text x="610" y="280" text-anchor="middle" class="label" style="font-size:8px;fill:#cc0000;font-weight:bold;">Ветвь 3: Нагрев (Контактор K1 + РМ-2м + ТЭН)</text>

<!-- ──── Sub-circuit A: Contact → РМ-2м → ТЭН (x=540) ──── -->

<!-- L' tap at x=540 -->
